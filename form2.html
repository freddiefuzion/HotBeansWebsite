<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <link rel="StyleSheet" href="style.css">
    <title>Hot Beans Web - Application Form</title>
</head>

<body>

<header>
  <h1>Hot Beans Web Development</h1>
  <img src="logo.png" alt="Hot Beans Logo">
  <nav class="menu">
    <ul class="navbar">
      <li><a href="index.html">Home</a></li>
      <li><a href="profile.html">Profile</a></li>
      <li><a href="eligibility.html">Eligibility</a></li>
      <li><a href="courses.html">Courses</a></li>
      <li><a href="form2.html">Apply Now</a></li>
    </ul>
  </nav>
</header>

<section class="content-section">

  <h1>Application Form</h1>

<form class="form" id="applicationForm" action="https://formspree.io/f/mzdwlkdn" method="POST">

    <div class="input-box">
      <label>First Name</label>
      <input type="text" id="fname" name="First Name" placeholder="e.g. Freddie" required>
      <small class="error" id="fnameError"></small>
    </div>

    <div class="input-box">
      <label>Last Name</label>
      <input type="text" id="lname" name="Last Name" placeholder="e.g. Simpson" required>
      <small class="error" id="lnameError"></small>
    </div>

    <div class="input-box">
      <label>Email</label>
      <input type="email" id="email" name="Email" placeholder="e.g. freddie@example.com" required>
      <small class="error" id="emailError"></small>
    </div>

    <div class="input-box">
      <label>Phone Number</label>
      <input type="text" id="pnumber" name="Phone Number" placeholder="e.g. 07123456789" required>
      <small class="error" id="phoneError"></small>
    </div>

    <div class="input-box">
      <label>Position Applying For</label>
      <select name="Position" required>
        <option value="">Choose a position</option>
        <option>Junior UI Developer</option>
        <option>Junior Front-End Developer</option>
        <option>Junior Back-End Developer</option>
      </select>
    </div>

    <div class="input-box">
      <label>Experience</label>
      <textarea name="Experience" rows="4" placeholder="Describe your experience here..." required></textarea>
    </div>

    <div class="button">
      <input class="button1" type="submit" value="Submit Application">
    </div>

</form>

<!-- CONNECT JAVASCRIPT -->
<script src="script.js"></script>



</section>

<footer>
  <p>© 2026 Hot Beans Web — Careers Website</p>
  <p>Contact us: careers@hotbeansweb.co.uk</p>
</footer>

</body>
</html>
