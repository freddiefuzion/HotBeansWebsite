<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <link rel="StyleSheet" href="style.css">
    <title>Hot Beans Web - Application Form</title>
</head>

<body>

<header>
  <h1>Hot Beans Web Development</h1>
  <img src="logo.png" alt="Hot Beans Logo">
  <nav class="menu">
    <ul class="navbar">
      <li><a href="index.html">Home</a></li>
      <li><a href="profile.html">Profile</a></li>
      <li><a href="eligibility.html">Eligibility</a></li>
      <li><a href="courses.html">Courses</a></li>
      <li><a href="form2.html">Apply Now</a></li>
    </ul>
  </nav>
</header>

<section class="content-section">

  <h1>Application Form</h1>

 
  <form class="form" action="https://formspree.io/f/mzdwlkdn" method="POST">

    <div class="input-box">
      <label>First Name</label>
      <input type="text" name="First Name" required>
    </div>

    <div class="input-box">
      <label>Last Name</label>
      <input type="text" name="Last Name" required>
    </div>

    <div class="input-box">
      <label>Email</label>
      <input type="email" name="Email" required>
    </div>

    <div class="input-box">
      <label>Phone Number</label>
      <input type="text" name="Phone Number" required>
    </div>

    <div class="input-box">
      <label>Position Applying For</label>
      <select name="Position" required>
        <option value="">Choose a position</option>
        <option>Junior UI Developer</option>
        <option>Junior Front-End Developer</option>
        <option>Junior Back-End Developer</option>
      </select>
    </div>

    <div class="input-box">
      <label>Experience</label>
      <textarea name="Experience" rows="4" required></textarea>
    </div>

    <div class="button">
      <input class="button1" type="submit" value="Submit Application">
    </div>

</form>


</section>

<footer>
  <p>© 2026 Hot Beans Web — Careers Website</p>
  <p>Contact us: careers@hotbeansweb.co.uk</p>
</footer>

</body>
</html>
